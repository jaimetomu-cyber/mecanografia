<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinosaurio - Mecanografía Martín T.H</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: #e0f7fa;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        
        /* Título Enlace al inicio */
        h1 a { 
            color: #00838f; 
            font-size: 3rem; 
            text-decoration: none;
            display: inline-block;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }
        h1 a:hover {
            transform: scale(1.05); 
        }

        /* Contenedor del Juego */
        .contenedor-juego {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            max-width: 800px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            margin-top: 0;
            font-size: 2.5rem;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 20px;
        }

        /* Iframe que contiene el juego exacto de Google */
        iframe {
            width: 100%;
            height: 350px;
            border: 4px solid #535353;
            border-radius: 10px;
            background-color: #f7f7f7;
        }
        
        /* Botón de volver */
        .btn-volver {
            display: inline-block;
            margin-top: 25px;
            font-size: 1.2rem;
            padding: 15px 25px;
            border-radius: 15px;
            text-decoration: none;
            background-color: #ffb300;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-volver:hover {
            transform: scale(1.05);
            background-color: #ffa000;
        }
    </style>
</head>
<body>

    <!-- TÍTULO ENLACE A INICIO 
    <h1><a href="index.html" title="Volver al Inicio">⌨️ Mecanografía Martín T.H</a></h1>
	
	-->
    
    <div class="contenedor-juego">
        <h2>¡El T-Rex! 🦖</h2>
        <p>Haz clic en el recuadro del juego y pulsa la <b>Barra Espaciadora</b> o la flecha <b>Arriba ⬆️</b> para saltar. <br>(Puedes agacharte con la flecha <b>Abajo ⬇️</b>)</p>
        
        <iframe id="juego-dino" src="https://wayou.github.io/t-rex-runner/" title="Chrome Dino Game" scrolling="no"></iframe>
        
        <br>
        <!-- AQUÍ ESTÁ EL CAMBIO EN EL ENLACE -->
        <a href="index.html#juegos" class="btn-volver">⬅️ Volver a los Juegos</a>
    </div>

    <script>
        window.onload = function() {
            document.getElementById('juego-dino').focus();
        };
    </script>
</body>
</html>
