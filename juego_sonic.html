<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic The Hedgehog - Mecanografía Martín T.H</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: #e0f7fa;
            text-align: center;
            margin: 0;
            padding: 10px; /* Reducido para ganar espacio arriba */
            overflow-x: hidden;
        }

        /* Contenedor del Juego */
        .contenedor-juego {
            background: #0044cc;
            border-radius: 20px;
            padding: 15px; /* Reducido para compactar */
            margin: 0 auto 15px auto;
            max-width: 700px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            border: 6px solid #ffcc00;
        }

        h2 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 2.2rem; /* Tamaño reducido ligeramente */
            text-shadow: 3px 3px 0px #000000;
        }

        p.instrucciones {
            font-size: 1rem;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 10px;
            display: inline-block;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        /* Ventana del juego menos alta para no tener que bajar la página */
        iframe {
            width: 100%;
            height: 420px; /* Altura reducida de 480 a 420 */
            border: 4px solid #000;
            border-radius: 10px;
            background-color: #000;
        }
        
        /* Botón de volver */
        .btn-volver {
            display: inline-block;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 15px;
            text-decoration: none;
            background-color: #ffb300;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-volver:hover {
            transform: scale(1.05);
            background-color: #ffa000;
        }
    </style>
</head>
<body>

    <div class="contenedor-juego">
        <h2>🦔 SONIC THE HEDGEHOG 💍</h2>
        
        <p class="instrucciones">
            <i>Haz clic en el juego para encender.</i> &nbsp;<b>Moverse:</b> ⬅️ ➡️ | <b>Agacharse:</b> ⬇️ | <b>Start:</b> Tecla 1 | <b>Saltar:</b> Espacio o Alt
        </p>
        
        <iframe src="https://archive.org/embed/sonic-the-hedgehog-anniversary-edition" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" allowtransparency="true" frameborder="0" scrolling="no"></iframe>
    </div>

    <a href="index.html#juegos" class="btn-volver">⬅️ Volver a los Juegos</a>

</body>
</html>
