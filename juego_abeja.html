<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abeja Saltarina</title>
    <style>
        body {
            margin: 0;
            padding: 20px 0;
            background-color: #87CEEB;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* El título ahora es un enlace */
        h1 a { 
            color: #00838f; 
            font-size: 3rem; 
            text-decoration: none; /* Quita el subrayado del enlace */
            display: inline-block;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }
        h1 a:hover {
            transform: scale(1.05); /* Efecto de que se puede pulsar */
        }

        h2.game-title {
            color: #333;
            font-size: 2.5rem;
            margin: 10px 0;
        }

        #scoreBoard {
            font-size: 28px;
            font-weight: bold;
            color: #FF9800;
            background: #fff;
            padding: 10px 30px;
            border-radius: 20px;
            border: 3px solid #FF9800;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        canvas {
            background-color: #E0F7FA;
            border: 5px solid #FFC107;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 1;
        }

        .instructions {
            margin-top: 15px;
            font-size: 18px;
            color: #333;
            background: rgba(255,255,255,0.7);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* --- Panel flotante IZQUIERDO (Historial) --- */
        #historyPanel {
            position: absolute;
            top: 50px;
            left: -320px;
            width: 250px;
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #FFC107;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: left 0.5s ease-in-out;
            z-index: 10;
            max-height: 70vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        #historyPanel.show {
            left: 20px;
        }

        #historyPanel h2 {
            margin-top: 0;
            font-size: 22px;
            color: #E65100;
            text-align: center;
            border-bottom: 2px dashed #FFC107;
            padding-bottom: 10px;
        }

        #scoreList {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #scoreList li {
            background: #FFF9C4;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: #424242;
            border: 1px solid #FFD54F;
        }

        /* --- Panel flotante DERECHO (Récord) --- */
        #bestScorePanel {
            position: absolute;
            top: 50px;
            right: 20px; /* Fijo a la derecha desde el principio */
            width: 200px;
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #FFC107;
            border-radius: 15px;
            padding: 15px;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
            text-align: center;
        }

        #bestScorePanel h2 {
            margin-top: 0;
            font-size: 22px;
            color: #E65100;
            border-bottom: 2px dashed #FFC107;
            padding-bottom: 10px;
        }

        #bestScoreValue {
            font-size: 40px;
            font-weight: bold;
            color: #424242;
            margin: 10px 0;
            text-shadow: 1px 1px 0px #FFD54F;
        }

        /* Botón de volver */
        .btn-volver {
            display: inline-block;
            margin-top: 25px;
            font-size: 1.2rem;
            padding: 15px 25px;
            border-radius: 15px;
            text-decoration: none;
            background-color: #ffb300;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-volver:hover {
            transform: scale(1.05);
            background-color: #ffa000;
        }
    </style>
</head>
<body>

    <!-- Enlace al inicio restaurado 
    <h1><a href="index.html" title="Volver al Inicio">⌨️ Mecanografía Martín T.H</a></h1>
	-->

    <!-- Panel de Historial (Izquierda) -->
    <div id="historyPanel">
        <h2>🏆 Puntuaciones</h2>
        <ul id="scoreList"></ul>
    </div>

    <!-- Panel de Récord (Derecha) -->
    <div id="bestScorePanel">
        <h2>🏆 Récord</h2>
        <div id="bestScoreValue">0 m</div>
    </div>

    <h2 class="game-title">🐝 Vuelo de la Abeja</h2>
    <div id="scoreBoard">Distancia: 0 m</div>
    
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    
    <div class="instructions">
        👉 Presiona <b>ESPACIO</b> o haz <b>CLIC</b> para empezar a volar.
    </div>

    <!-- BOTÓN PARA VOLVER A LOS JUEGOS -->
    <a href="index.html#juegos" class="btn-volver">⬅️ Volver a los Juegos</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreBoard');
        
        // Elementos de los paneles
        const historyPanel = document.getElementById('historyPanel');
        const scoreList = document.getElementById('scoreList');
        const bestScoreValue = document.getElementById('bestScoreValue');

        let frames = 0;
        let score = 0;
        let gameSpeed = 2.5;
        let gameOver = false;
        let gameCount = 0;
        let highScore = 0; // Variable para guardar el récord

        // Objeto Abeja
        const bee = {
            x: 150,
            y: 225,
            radius: 15,
            velocity: 0,
            gravity: 0.22,
            jump: -5.5,
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#FFEB3B';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#000';
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(this.x - 5, this.y - 14);
                ctx.lineTo(this.x - 5, this.y + 14);
                ctx.moveTo(this.x + 3, this.y - 14);
                ctx.lineTo(this.x + 3, this.y + 14);
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#222';
                ctx.stroke();

                ctx.beginPath();
                ctx.ellipse(this.x - 5, this.y - 15, 12, 6, Math.PI / 4, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = '#000';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(this.x + 8, this.y - 4, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
            },
            
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                if (this.y + this.radius >= canvas.height || this.y - this.radius <= 0) {
                    gameOver = true;
                }
            },
            
            flap() {
                this.velocity = this.jump;
            }
        };

        const panels = [];
        const panelWidth = 75;
        let gap = 190;

        function drawPanels() {
            for (let i = 0; i < panels.length; i++) {
                let p = panels[i];
                
                ctx.fillStyle = '#FF9800';
                ctx.strokeStyle = '#E65100';
                ctx.lineWidth = 4;
                
                ctx.fillRect(p.x, 0, panelWidth, p.top);
                ctx.strokeRect(p.x, 0, panelWidth, p.top);
                
                ctx.fillRect(p.x, canvas.height - p.bottom, panelWidth, p.bottom);
                ctx.strokeRect(p.x, canvas.height - p.bottom, panelWidth, p.bottom);
                
                p.x -= gameSpeed;
                
                let beeLeft = bee.x - bee.radius;
                let beeRight = bee.x + bee.radius;
                let beeTop = bee.y - bee.radius;
                let beeBottom = bee.y + bee.radius;

                if (
                    beeRight > p.x && beeLeft < p.x + panelWidth &&
                    (beeTop < p.top || beeBottom > canvas.height - p.bottom)
                ) {
                    gameOver = true;
                }
                
                if (p.x + panelWidth < 0) {
                    panels.shift();
                    i--;
                }
            }
        }

        function resetGame() {
            if (gameCount === 0) historyPanel.classList.remove('show');
            
            bee.y = 225;
            bee.velocity = 0;
            panels.length = 0; 
            score = 0;
            gameSpeed = 2.5;
            gap = 190;
            frames = 0;
            gameOver = false;
            loop(); 
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameOver) resetGame();
                else bee.flap();
            }
        });
        
        canvas.addEventListener('mousedown', () => {
            if (gameOver) resetGame();
            else bee.flap();
        });

        function loop() {
            if (gameOver) {
                let finalScore = Math.floor(score);
                
                // Procesar guardado si la partida es válida (salen obstáculos)
                if (frames > 240) {
                    gameCount++;
                    
                    // Actualizar Historial
                    let listItem = document.createElement('li');
                    listItem.innerText = `Partida ${gameCount}: ${finalScore} m`;
                    scoreList.appendChild(listItem);
                    historyPanel.scrollTop = historyPanel.scrollHeight;
                    historyPanel.classList.add('show');
                    
                    // Actualizar Récord si es mayor
                    if (finalScore > highScore) {
                        highScore = finalScore;
                        bestScoreValue.innerText = `${highScore} m`;
                        
                        // Efecto visual rápido para celebrar el récord
                        bestScoreValue.style.color = "#E65100";
                        setTimeout(() => bestScoreValue.style.color = "#424242", 500);
                    }
                }
                
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0,0,canvas.width, canvas.height);
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 45px sans-serif';
                ctx.textAlign = 'center';
                
                if (frames <= 240) {
                    ctx.fillText('¡Salida en falso! 💨', canvas.width/2, canvas.height/2 - 20);
                } else if (finalScore >= highScore && gameCount > 0) {
                    ctx.fillText('¡NUEVO RÉCORD! 🎉', canvas.width/2, canvas.height/2 - 20);
                } else {
                    ctx.fillText('¡Buen intento! 🍯', canvas.width/2, canvas.height/2 - 20);
                }
                
                ctx.font = '24px sans-serif';
                ctx.fillStyle = '#FFC107';
                ctx.fillText(`Has recorrido: ${finalScore} metros`, canvas.width/2, canvas.height/2 + 20);
                
                ctx.fillStyle = 'white';
                ctx.font = '20px sans-serif';
                ctx.fillText('Haz clic o presiona ESPACIO para volar otra vez', canvas.width/2, canvas.height/2 + 70);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (frames < 240) {
                ctx.fillStyle = '#00796B';
                ctx.font = 'bold 20px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`¡Prepárate! Los paneles aparecen en: ${Math.ceil((240 - frames)/60)}s`, canvas.width/2, 50);
            }

            bee.draw();
            bee.update();

            if (frames > 240) {
                let spawnRate = Math.max(90, Math.floor(320 / gameSpeed));
                if ((frames - 240) % spawnRate === 0) {
                    let minHeight = 40;
                    let maxHeight = canvas.height - gap - minHeight;
                    let topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
                    let bottomHeight = canvas.height - gap - topHeight;

                    panels.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: bottomHeight
                    });
                }
            }

            drawPanels();

            score += gameSpeed / 60;
            scoreElement.innerText = `Distancia: ${Math.floor(score)} m`;
            gameSpeed += 0.0007;

            frames++;
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
