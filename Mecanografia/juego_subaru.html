<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Subaru</title>
    <style>
        body {
            margin: 0;
            padding: 20px 0;
            background-color: #87CEEB; /* Color cielo de fondo */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
            position: relative; 
        }

        /* El título ahora es un enlace */
        h1 a { 
            color: #00838f; 
            font-size: 3rem; 
            text-decoration: none; 
            display: inline-block;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }
        h1 a:hover {
            transform: scale(1.05);
        }

        /* Contenedor principal que centra el juego */
        .main-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* ----- SECCIÓN DEL HISTORIAL (FLOTANTE A LA IZQUIERDA) ----- */
        .history-section {
            position: absolute; 
            left: 20px;         
            top: 80px;          
            
            background-color: #fff;
            border: 5px solid #333;
            border-radius: 10px;
            width: 220px;
            
            max-height: 0;
            padding: 0;
            opacity: 0;
            overflow: hidden; 
            
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            
            transition: max-height 0.6s ease-out, opacity 0.6s ease-out, padding 0.6s ease-out;
            z-index: 5;
        }

        .history-section.visible {
            max-height: 480px; 
            padding: 10px;
            opacity: 1;
        }

        .history-section h2 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #FF8C00;
            font-size: 22px;
            border-bottom: 3px dashed #ccc;
            padding-bottom: 10px;
        }

        #history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto; 
            flex-grow: 1;
        }

        #history-list li {
            background-color: #e0f7fa;
            border: 2px solid #00acc1;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            color: #006064;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            animation: popIn 0.3s ease-out;
        }

        /* ----- SECCIÓN DEL RÉCORD (FLOTANTE A LA DERECHA) ----- */
        .highscore-section {
            position: absolute; 
            right: 20px;         
            top: 80px;          
            
            background-color: #fff;
            border: 5px solid #B8860B; 
            border-radius: 10px;
            width: 220px;
            
            max-height: 0;
            padding: 0;
            opacity: 0;
            overflow: hidden; 
            
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            
            transition: max-height 0.6s ease-out, opacity 0.6s ease-out, padding 0.6s ease-out;
            z-index: 5;
        }

        .highscore-section.visible {
            max-height: 200px; 
            padding: 15px 10px;
            opacity: 1;
        }

        .highscore-section h2 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #DAA520; 
            font-size: 24px;
            border-bottom: 3px dashed #DAA520;
            padding-bottom: 10px;
            width: 100%;
        }

        .record-box {
            background-color: #FFF8DC;
            border: 3px solid #FFD700;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            width: 80%;
            animation: popIn 0.3s ease-out;
        }

        .record-game {
            display: block;
            font-size: 18px;
            color: #8B6508;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .record-score {
            display: block;
            font-size: 28px;
            color: #FF8C00;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ----- SECCIÓN DEL JUEGO ----- */
        .game-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #FF8C00;
            padding: 5px 20px;
            border-radius: 20px;
            margin-bottom: 10px;
            border: 3px solid white;
        }

        #game-container {
            position: relative;
            width: 300px;
            height: 500px;
            background-color: #444; 
            border: 5px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .road-line {
            position: absolute;
            width: 6px;
            height: 40px;
            background-color: #fff;
            opacity: 0.6;
        }

        #car {
            position: absolute;
            bottom: 20px;
            width: 50px;
            height: 85px;
            background-color: #0055ff; 
            border-radius: 10px;
            transition: left 0.1s ease-out; /* Ágil */
            z-index: 10;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
        }

        #car::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 2px;
            width: 46px;
            height: 8px;
            background-color: #0033cc;
            border-radius: 2px;
        }

        .wheel {
            position: absolute;
            width: 8px;
            height: 16px;
            background-color: #111;
            border-radius: 2px;
        }
        .tl { top: 12px; left: -6px; }  
        .tr { top: 12px; right: -6px; } 
        .bl { bottom: 16px; left: -6px; }
        .br { bottom: 16px; right: -6px; }

        .windshield {
            position: absolute;
            top: 22px;
            left: 6px;
            width: 38px;
            height: 14px;
            background-color: #a5d6a7; 
            border-radius: 4px 4px 2px 2px;
            border: 1px solid #75a478;
        }
        
        .rear-window {
            position: absolute;
            bottom: 18px;
            left: 8px;
            width: 34px;
            height: 10px;
            background-color: #a5d6a7;
            border-radius: 2px;
            border: 1px solid #75a478;
        }

        .headlight {
            position: absolute;
            top: -2px;
            width: 8px;
            height: 5px;
            background-color: #fffdcc;
            border-radius: 2px;
        }
        .hl-left { left: 6px; }
        .hl-right { right: 6px; }

        /* Obstáculos y Recompensas */
        .obstacle, .reward {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 45px;
            text-align: center;
            line-height: 60px;
            top: -100px;
            z-index: 5;
        }

        /* Animación al recolectar estrella */
        .anim-recompensa {
            animation: rewardPop 0.3s ease-out forwards;
        }

        @keyframes rewardPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
            z-index: 20;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            background-color: #32CD32;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            border: 3px solid white;
        }

        button:active {
            transform: scale(0.95);
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .btn-control {
            font-size: 30px;
            width: 80px;
            height: 60px;
            background-color: #4682B4;
        }

        /* Botón de volver */
        .btn-volver {
            display: inline-block;
            margin-top: 25px;
            font-size: 1.2rem;
            padding: 15px 25px;
            border-radius: 15px;
            text-decoration: none;
            background-color: #ffb300;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-volver:hover {
            transform: scale(1.05);
            background-color: #ffa000;
        }

        /* Responsivo */
        @media (max-width: 900px) {
            .history-section, .highscore-section {
                position: relative;
                left: 0;
                right: 0;
                top: 0;
                margin-bottom: 20px;
                width: 300px;
            }
            .main-wrapper {
                flex-direction: column; 
                align-items: center;
            }
            body {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<!--
    <h1><a href="index.html" title="Volver al Inicio">⌨️ Mecanografía Martín T.H</a></h1>
-->	
    <h1>🚙 ¡Subaru en Acción! 🚙</h1>

    <div class="history-section" id="history-section">
        <h2>🏆 Puntuaciones</h2>
        <ul id="history-list"></ul>
    </div>

    <div class="highscore-section" id="highscore-section">
        <h2>🥇 Récord</h2>
        <div class="record-box">
            <span class="record-game" id="best-game">Partida -</span>
            <span class="record-score" id="best-score">0 pts</span>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="game-section">
            <div id="score-board">Puntos: <span id="score">0</span></div>

            <div id="game-container">
                <div id="car">
                    <div class="wheel tl"></div>
                    <div class="wheel tr"></div>
                    <div class="wheel bl"></div>
                    <div class="wheel br"></div>
                    <div class="windshield"></div>
                    <div class="rear-window"></div>
                    <div class="headlight hl-left"></div>
                    <div class="headlight hl-right"></div>
                </div>

                <div id="game-over">
                    <h2>¡Ay! Chocamos</h2>
                    <p>Puntos: <span id="final-score">0</span></p>
                    <button onclick="startGame()">¡Jugar de nuevo!</button>
                </div>
            </div>

            <div class="controls">
                <button class="btn-control" onclick="moveLeft()">⬅️</button>
                <button class="btn-control" onclick="moveRight()">➡️</button>
            </div>

            <a href="index.html#juegos" class="btn-volver">⬅️ Volver a los Juegos</a>
        </div>
    </div>

    <script>
        const car = document.getElementById('car');
        const gameContainer = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        
        const historyList = document.getElementById('history-list');
        const historySection = document.getElementById('history-section');
        
        const highscoreSection = document.getElementById('highscore-section');
        const bestGameElement = document.getElementById('best-game');
        const bestScoreElement = document.getElementById('best-score');

        const carLanes = [25, 125, 225];
        const obstacleLanes = [20, 120, 220];
        
        let currentLane = 1; 
        let score = 0;
        
        // ¡MOTOR TURBO!
        let gameSpeed = 4.8; 
        const MAX_SPEED = 8.0; 
        
        let gameLoop;
        let spawnTimer;
        let lineTimer;
        let isGameOver = false;
        
        let totalGamesPlayed = 0; 
        let highestScore = 0; 

        function updateCarPosition() {
            car.style.left = carLanes[currentLane] + 'px';
        }

        function moveLeft() {
            if (currentLane > 0 && !isGameOver) {
                currentLane--;
                updateCarPosition();
            }
        }

        function moveRight() {
            if (currentLane < 2 && !isGameOver) {
                currentLane++;
                updateCarPosition();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
        });

        function createRoadLine() {
            if (isGameOver) return;
            
            [97, 197].forEach(xPos => {
                const line = document.createElement('div');
                line.classList.add('road-line');
                line.style.left = xPos + 'px';
                line.style.top = '-40px';
                gameContainer.appendChild(line);
            });
        }

        function spawnEntities() {
            if (isGameOver) return;

            let lanes = [0, 1, 2];
            lanes.sort(() => Math.random() - 0.5);

            // Probabilidad dinámica
            let numObstacles = Math.random() < 0.4 ? 2 : 1;

            // Spawnear obstáculos
            for (let i = 0; i < numObstacles; i++) {
                let lane = lanes[i];
                const obstacle = document.createElement('div');
                obstacle.classList.add('obstacle');
                const emojis = ['🚧', '🧱', '🌲', '📦'];
                obstacle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                obstacle.style.left = obstacleLanes[lane] + 'px';
                obstacle.style.top = '-100px';
                obstacle.dataset.lane = lane;
                gameContainer.appendChild(obstacle);
            }

            // Spawnear premio
            if (Math.random() < 0.6) {
                let rewardLane = lanes[2];
                const reward = document.createElement('div');
                reward.classList.add('reward');
                reward.innerText = '⭐';
                reward.style.left = obstacleLanes[rewardLane] + 'px';
                reward.style.top = '-100px';
                reward.dataset.lane = rewardLane;
                gameContainer.appendChild(reward);
            }
        }

        function update() {
            if (isGameOver) return;

            // Mover las líneas
            const lines = document.querySelectorAll('.road-line');
            lines.forEach(line => {
                let topPos = parseInt(line.style.top);
                line.style.top = (topPos + gameSpeed + 1) + 'px';
                if (topPos > 500) {
                    line.remove();
                }
            });

            // Mover obstáculos y comprobar colisiones
            const obstacles = document.querySelectorAll('.obstacle');
            obstacles.forEach(obstacle => {
                let topPos = parseInt(window.getComputedStyle(obstacle).getPropertyValue('top'));
                obstacle.style.top = (topPos + gameSpeed) + 'px';

                // Colisión
                if (topPos > 340 && topPos < 460 && parseInt(obstacle.dataset.lane) === currentLane) {
                    endGame();
                }

                // Superado
                if (topPos > 500) {
                    obstacle.remove();
                    score += 1;
                    scoreElement.innerText = score;
                    
                    // Aceleración suave y continua
                    if (gameSpeed < MAX_SPEED) {
                        gameSpeed += 0.05; 
                    }
                }
            });

            // Mover estrellas y comprobar recolección
            const rewards = document.querySelectorAll('.reward');
            rewards.forEach(reward => {
                let topPos = parseInt(window.getComputedStyle(reward).getPropertyValue('top'));
                reward.style.top = (topPos + gameSpeed) + 'px';

                // Capturar
                if (topPos > 340 && topPos < 460 && parseInt(reward.dataset.lane) === currentLane && !reward.classList.contains('anim-recompensa')) {
                    score += 5; 
                    scoreElement.innerText = score;
                    
                    reward.classList.add('anim-recompensa');
                    setTimeout(() => reward.remove(), 300);
                }

                if (topPos > 500 && !reward.classList.contains('anim-recompensa')) {
                    reward.remove();
                }
            });

            gameLoop = requestAnimationFrame(update);
        }

        function addScoreToHistory() {
            // [MODIFICACIÓN AQUÍ]
            // No registrar si la puntuación es 0 pts (el coche no arrancó o chocó enseguida)
            if (score === 0) {
                return; 
            }

            totalGamesPlayed++;
            
            // Paneles visibles tras la primera partida válida
            if (totalGamesPlayed === 1) {
                historySection.classList.add('visible');
                highscoreSection.classList.add('visible');
            }

            // Récord
            if (score > highestScore || totalGamesPlayed === 1) {
                highestScore = score;
                bestGameElement.innerText = `Partida ${totalGamesPlayed}`;
                bestScoreElement.innerText = `${highestScore} pts`;
                
                const recordBox = document.querySelector('.record-box');
                recordBox.style.transform = 'scale(1.1)';
                setTimeout(() => { recordBox.style.transform = 'scale(1)'; }, 200);
            }

            // Lista
            const listItem = document.createElement('li');
            const spanPartida = document.createElement('span');
            spanPartida.innerText = `Partida ${totalGamesPlayed}`;
            const spanPuntos = document.createElement('span');
            spanPuntos.innerText = `${score} pts`;
            
            listItem.appendChild(spanPartida);
            listItem.appendChild(spanPuntos);
            historyList.appendChild(listItem);
            historyList.scrollTop = historyList.scrollHeight;
        }

        function endGame() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            clearInterval(spawnTimer);
            clearInterval(lineTimer);
            gameOverScreen.style.display = 'flex';
            finalScoreElement.innerText = score;
            
            addScoreToHistory();
        }

        function startGame() {
            document.querySelectorAll('.obstacle').forEach(obs => obs.remove());
            document.querySelectorAll('.reward').forEach(rew => rew.remove());
            document.querySelectorAll('.road-line').forEach(line => line.remove());

            score = 0;
            gameSpeed = 4.8; // Turbo inicial
            currentLane = 1;
            isGameOver = false;
            
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            updateCarPosition();

            // Spawn rápido
            spawnTimer = setInterval(spawnEntities, 1100); 
            lineTimer = setInterval(createRoadLine, 250); 
            update();
        }

        updateCarPosition();
        startGame();
    </script>
</body>
</html>
