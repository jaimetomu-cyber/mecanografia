<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Mecanografía Martín T.H</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: #e0f7fa;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Contenedor del Juego */
        .contenedor-juego {
            background: #5c94fc; /* Color azul cielo de Super Mario */
            border-radius: 20px;
            padding: 20px;
            margin: 0 auto 20px auto;
            max-width: 700px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            border: 6px solid #e52521; /* Color rojo Mario */
        }

        h2 {
            color: #ffffff;
            margin-top: 0;
            font-size: 2.8rem;
            text-shadow: 3px 3px 0px #000000;
        }

        p.instrucciones {
            font-size: 1.1rem;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        /* Ventana del juego ajustada para el clon HTML5 */
        iframe {
            width: 100%;
            height: 480px; 
            border: 4px solid #000;
            border-radius: 10px;
            background-color: #000;
        }
        
        /* Botón de volver */
        .btn-volver {
            display: inline-block;
            font-size: 1.2rem;
            padding: 15px 25px;
            border-radius: 15px;
            text-decoration: none;
            background-color: #ffb300;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn-volver:hover {
            transform: scale(1.05);
            background-color: #ffa000;
        }
    </style>
</head>
<body>

    <div class="contenedor-juego">
        <h2>🍄 SUPER MARIO BROS ⭐</h2>
        <p class="instrucciones">
            Haz clic dentro del cuadro negro para empezar a jugar.<br>
            <b>Moverse:</b> Flechas ⬅️ ➡️ | <b>Agacharse:</b> Flecha Abajo ⬇️<br>
            <b>Saltar:</b> Barra Espaciadora | <b>Correr/Fuego:</b> Tecla Shift (Mayús)
        </p>
        
        <!-- Clon de código abierto alojado en GitHub (cero publicidad) -->
        <iframe src="https://jcw87.github.io/c2-smb1/" allowtransparency="true" frameborder="0" scrolling="no"></iframe>
    </div>

    <a href="index.html#juegos" class="btn-volver">⬅️ Volver a los Juegos</a>

</body>
</html>
